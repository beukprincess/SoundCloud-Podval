name: Deploy SoundCloud Bot

on:
  push:
    branches: [ develop, main ]

jobs:
  deploy-bot:
    runs-on: [self-hosted, k3s-runner]
    
    steps:
    - uses: actions/checkout@v4

    
    - name: Build and Import Image to K3s
      run: |
        IMAGE_TAG="soundcloud-bot:${{ github.sha }}"
        
        # Збираємо Docker-образ
        docker build -t $IMAGE_TAG ./Bot
        
        docker save $IMAGE_TAG | sudo k3s ctr -n k8s.io images import -
        
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Update K3s Deployment
      run: |
        sudo k3s kubectl set image deployment/soundcloud-bot bot=soundcloud-bot:${{ github.sha }} -n telegram-bots
        
        sudo k3s kubectl rollout status deployment/soundcloud-bot -n telegram-bots
